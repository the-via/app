on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [definition_update]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install --frozen-lockfile
      - name: Refresh Deps
        run: bun run refresh-kbs
      - name: Build
        run: bun run build
      - name: Configure Cloudflare Pages routing
        run: |
          cat > dist/_redirects <<'EOF'
          /test /index.html 200
          /design /index.html 200
          /settings /index.html 200
          /debug /index.html 200
          /errors /index.html 200
          EOF

          cat > dist/404.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Not Found</title>
            </head>
            <body>
              <h1>Not Found</h1>
              <p>The requested file could not be found.</p>
            </body>
          </html>
          EOF
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_ACCOUNT_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=app
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
